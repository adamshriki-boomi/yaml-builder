<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Option B — Ghost Dropdown Inline with Tabs</title>
<style>
  :root {
    --exo-bg: #fff; --exo-bg-secondary: #f6f7f9; --exo-font: #1a1f36;
    --exo-font-secondary: #6b7280; --exo-border: #d8dce6; --exo-primary: #0052cc;
    --exo-primary-light: #e6effa; --exo-radius: 4px;
    --font: 'Segoe UI', -apple-system, sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: var(--font); color: var(--exo-font); background: var(--exo-bg); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

  .header { display: flex; align-items: center; justify-content: center; height: 48px; border-bottom: 1px solid var(--exo-border); padding: 0 16px; position: relative; }
  .logo { position: absolute; left: 16px; display: flex; align-items: center; gap: 8px; font-weight: 700; font-size: 14px; }
  .logo-mark { width: 22px; height: 22px; background: var(--exo-primary); border-radius: 5px; display: flex; align-items: center; justify-content: center; color: #fff; font-size: 10px; font-weight: 700; font-family: monospace; }
  .top-tabs { display: flex; gap: 4px; }
  .top-tab { padding: 6px 16px; font-size: 13px; font-weight: 500; border-radius: 6px; cursor: pointer; color: var(--exo-font-secondary); border: none; background: none; }
  .top-tab.active { background: var(--exo-primary-light); color: var(--exo-primary); font-weight: 600; }

  .main { display: flex; flex: 1; overflow: hidden; }
  .left { flex: 1; display: flex; flex-direction: column; overflow: hidden; min-width: 0; }
  .divider { width: 2px; background: var(--exo-border); }
  .right { flex: 1; display: flex; flex-direction: column; overflow: hidden; background: var(--exo-bg-secondary); }

  /* Tab bar with ghost dropdown at the end */
  .tab-bar {
    display: flex;
    align-items: center;
    border-bottom: 2px solid var(--exo-border);
    padding: 2px 16px 0;
    gap: 0;
  }
  .tab-bar-center { display: flex; align-items: center; gap: 0; margin: 0 auto; }
  .tab-bar-divider { width: 1px; height: 18px; background: var(--exo-border); }
  .tab-item { padding: 10px 14px; font-size: 13px; font-weight: 500; color: var(--exo-font-secondary); cursor: pointer; border: none; background: none; border-bottom: 2px solid transparent; margin-bottom: -2px; white-space: nowrap; }
  .tab-item.active { color: var(--exo-primary); border-bottom-color: var(--exo-primary); font-weight: 600; }

  /* Ghost dropdown — far right of the tab row, muted */
  .template-ghost {
    margin-left: auto;
    display: flex;
    align-items: center;
    gap: 4px;
    padding: 4px 10px;
    border: 1px dashed var(--exo-border);
    border-radius: var(--exo-radius);
    font-size: 11px;
    color: var(--exo-font-secondary);
    cursor: pointer;
    transition: all 0.12s;
    white-space: nowrap;
    margin-bottom: 6px;
  }
  .template-ghost:hover {
    border-color: var(--exo-primary);
    color: var(--exo-primary);
    background: var(--exo-primary-light);
  }
  .template-ghost svg { width: 12px; height: 12px; }

  .content { flex: 1; padding: 20px; overflow-y: auto; color: var(--exo-font-secondary); font-size: 13px; }
  .yaml-header { padding: 10px 16px; border-bottom: 1px solid var(--exo-border); background: var(--exo-bg); font-size: 12px; font-weight: 600; color: var(--exo-font-secondary); text-transform: uppercase; letter-spacing: 0.5px; }
  .yaml-body { flex: 1; padding: 16px; font-family: monospace; font-size: 12px; line-height: 1.7; overflow: auto; }

  .badge { position: fixed; bottom: 20px; right: 20px; background: #6b5ce7; color: #fff; padding: 10px 18px; border-radius: 8px; font-size: 13px; font-weight: 600; z-index: 100; box-shadow: 0 4px 16px rgba(107,92,231,0.3); }
  .badge small { display: block; font-size: 11px; font-weight: 400; opacity: 0.6; margin-top: 2px; }
</style>
</head>
<body>
<div class="badge">Option B — Ghost Dropdown<small>Dashed-border button at far right of tab bar row</small></div>

<div class="header">
  <div class="logo"><div class="logo-mark">YB</div> YAML Builder</div>
  <div class="top-tabs">
    <button class="top-tab active">Editor</button>
    <button class="top-tab">Test</button>
  </div>
</div>

<div class="main">
  <div class="left">
    <div class="tab-bar">
      <div class="tab-bar-center">
        <button class="tab-item active">Connector Configuration</button>
        <span class="tab-bar-divider"></span>
        <button class="tab-item">Interface Parameters</button>
        <span class="tab-bar-divider"></span>
        <button class="tab-item">Workflow Steps</button>
      </div>
      <!-- Ghost dropdown — far right, dashed border, muted -->
      <div class="template-ghost">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
        Template
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:10px;height:10px"><polyline points="6 9 12 15 18 9"/></svg>
      </div>
    </div>
    <div class="content">
      <p>Form content here...</p>
    </div>
  </div>
  <div class="divider"></div>
  <div class="right">
    <div class="yaml-header">YAML Configuration</div>
    <div class="yaml-body">
      <span style="color:#0052cc">connector:</span><br>
      &nbsp;&nbsp;<span style="color:#0052cc">name:</span> My Connector<br>
      &nbsp;&nbsp;<span style="color:#0052cc">base_url:</span> https://api.example.com
    </div>
  </div>
</div>
</body>
</html>
